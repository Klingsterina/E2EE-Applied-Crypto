<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E2EE Chat</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <section id="join-screen" class="screen auth-screen">
        <div class="auth-hero">
          <h1>Join or create a room</h1>
        </div>

        <div class="auth-card">
          <div class="field identity-field">
            <div class="field-heading">
              <label>Identity key*</label>
            </div>

            <div class="key-actions" role="group" aria-label="Identity key actions">
              <button id="generate-key-btn" type="button">Generate key</button>
              <button id="download-key-btn" type="button" disabled>Download key backup</button>
              <button id="import-key-btn" type="button">Import key backup</button>
            </div>

            <input id="import-key-file" type="file" accept="application/json" hidden />
            <p id="key-status" class="status-text"></p>

            <div class="identity-info compact-identity-info">
              <p class="identity-fingerprint-line">
                <strong>Your key fingerprint:</strong>
                <code id="identity-fingerprint">No identity key loaded</code>
              </p>

              <details class="public-key-details">
                <summary>Show public key</summary>
                <pre class="public-key-box"><code id="identity-public-key"></code></pre>
              </details>
            </div>
          </div>

          <div class="mode-switch" role="tablist" aria-label="Room mode">
            <button type="button" class="mode-tab is-active" data-mode="join" role="tab" aria-selected="true">Join room</button>
            <button type="button" class="mode-tab" data-mode="create" role="tab" aria-selected="false">Create room</button>
          </div>

          <div class="field shared-field">
            <label for="username">Username*</label>
            <input id="username" type="text" placeholder="Enter your username" autocomplete="nickname" />
          </div>

          <div class="mode-panel" data-panel="join">
            <div class="field">
              <label for="room">Room code*</label>
              <input id="room" type="text" placeholder="Paste a room code to join" autocomplete="off" />
            </div>

            <div class="action-row single-action-row">
              <button id="join-btn" type="button" class="primary-action">Join room</button>
            </div>
          </div>

          <div class="mode-panel hidden-mode" data-panel="create" aria-hidden="true">
            <div class="action-row single-action-row">
              <button id="create-room-btn" type="button" class="secondary-action">Create room</button>
            </div>
          </div>

          <p id="status" class="status-text"></p>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.min.js"></script>
    <script src="/socket.js"></script>
    <script src="/crypto.js"></script>
    <script src="/join.js"></script>
  </body>
</html>
