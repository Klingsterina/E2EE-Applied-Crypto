<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E2EE Chat</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section id="join-screen" class="screen">
        <h1>E2EE Chat</h1>

        <div class="card">
          <h2>Create or Join a Room</h2>

          <div class="field">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter your username" />
          </div>

          <div class="field">
            <label for="room">Room Code</label>
            <input id="room" type="text" placeholder="Paste room code" />
          </div>

          <button id="create-room-btn" type="button">Create secure room</button>
          <button id="join-btn" type="button">Join room</button>

          <p id="status" class="status-text"></p>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="socket.js"></script>
    <script src="crypto.js"></script>
    <script src="join.js"></script>
  </body>
</html>
