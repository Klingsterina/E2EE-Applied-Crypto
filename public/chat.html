<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Chat Room</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section id="chat-screen" class="screen">
      <div class="chat-layout">
        <header class="chat-header">
          <div class="chat-header-main">
            <h1 class="chat-title">Secure Chat</h1>
            <p class="chat-subtitle">
              Room: <span id="chat-room">-</span>
            </p>
          </div>

          <div class="chat-header-right">
            <p class="chat-user">You: <span id="chat-username">-</span></p>
            <div class="chat-header-actions">
              <span id="chat-status-badge" class="chat-status connecting">Connecting</span>
              <button id="leave-room-btn" type="button" class="secondary-action">Leave room</button>
            </div>
          </div>
        </header>

        <details class="security-details">
          <summary class="security-details-summary">
            <span>Verify keys</span>
            <span id="peer-fingerprint-status" class="identity-status-text"></span>
          </summary>

          <div class="identity-panel">
            <div class="identity-row">
              <span class="identity-label">Your fingerprint</span>
              <code id="local-fingerprint">Loading...</code>
            </div>
            <div class="identity-row">
              <span class="identity-label">Peer fingerprint</span>
              <div class="identity-value-stack">
                <span id="peer-identity-username" class="identity-peer-name"></span>
                <code id="peer-fingerprint">Waiting for peer key...</code>
              </div>
            </div>
          </div>
        </details>

        <section id="chat-messages" class="chat-messages">
          <div class="empty-state" id="empty-state">
            No messages yet. Start the conversation.
          </div>
        </section>

        <form id="chat-form" class="chat-composer">
          <input
            id="chat-input"
            type="text"
            placeholder="Write a message..."
            autocomplete="off"
          />
          <button id="chat-send-btn" type="submit">Send</button>
        </form>
      </div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="socket.js"></script>
  <script src="crypto.js"></script>
  <script src="chat.js"></script>
</body>
</html>
